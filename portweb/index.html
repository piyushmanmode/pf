<body>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a23;
            font-family: 'Poppins', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .construction-container {
            text-align: center;
        }

        .construction-container h1 {
            font-size: 5rem;
            color: #a368da;
            margin-bottom: 20px;
            animation: glow 2s infinite alternate;
        }

        .construction-container p {
            font-size: 1.5rem;
            color: #d1d1d1;
        }

        .emoji {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: bounce 1.5s infinite;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #a368da;
            }

            to {
                text-shadow: 0 0 25px #c084fc;
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @media (max-width: 768px) {
            .construction-container h1 {
                font-size: 3rem;
            }

            .construction-container p {
                font-size: 1rem;
            }
        }
    </style>

    <div class="construction-container">
        <div class="emoji">🚧</div>
        <h1>UNDER CONSTRUCTION</h1>
        <p>Website is currently being built.<br>Come back soon.</p>
    </div>

</body>
