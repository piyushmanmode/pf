<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    h2 {
      margin-top: 0;
      color: #0f172a;
    }

    p {
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Website with Chatbot</h1>
  </header>

  <main>
    <div class="card">
      <h2>Welcome</h2>
      <p>
        This is a sample HTML page with your chatbot embedded.
        If the chatbot script is loaded correctly, it should appear on this page automatically.
      </p>
      <p>
        Make sure the JavaScript file exists in the correct <code>dist</code> folder path.
      </p>
    </div>
  </main>

  <footer>
    Chatbot integration demo page
  </footer>

  <script
    async
    data-chatbot="9f0ecbcd-8338-4b3e-b007-1baf412b8fb6"
    src="./dist/agentkit-chatbot.js">
  </script>
</body>
</html>
