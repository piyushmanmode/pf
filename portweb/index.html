<body>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #050516, #111144);
            color: white;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .construction-container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 40px 20px;
        }

        .emoji {
            font-size: clamp(4rem, 10vw, 7rem);
            margin-bottom: 20px;
            animation: bounce 1.8s infinite;
        }

        h1 {
            font-size: clamp(2rem, 7vw, 5rem);
            color: #bb86fc;
            letter-spacing: 2px;
            margin-bottom: 20px;
            line-height: 1.2;
            animation: glow 2s infinite alternate;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: #d6d6d6;
            line-height: 1.8;
            padding: 0 10px;
        }

        .loader {
            width: 80%;
            max-width: 400px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin: 35px auto 0;
            overflow: hidden;
        }

        .loader span {
            display: block;
            height: 100%;
            width: 40%;
            background: #bb86fc;
            border-radius: 20px;
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #bb86fc;
            }

            to {
                text-shadow: 0 0 30px #d5a8ff;
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(350%);
            }
        }

        /* Small Phones */
        @media (max-width: 480px) {
            .construction-container {
                padding: 20px 10px;
            }

            p br {
                display: none;
            }
        }

        /* Tablets */
        @media (min-width: 481px) and (max-width: 1024px) {
            .construction-container {
                padding: 30px;
            }
        }

        /* Large Screens */
        @media (min-width: 1400px) {
            .construction-container {
                max-width: 1200px;
            }
        }
    </style>

    <div class="construction-container">

        <div class="emoji">🚧</div>

        <h1>UNDER CONSTRUCTION</h1>

        <p>
            This website is currently under development.
            <br>
            We are working hard to launch something amazing soon.
        </p>

        <div class="loader">
            <span></span>
        </div>

    </div>

</body>
